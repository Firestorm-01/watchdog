<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WatchDog Test Page</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 480px;
      margin: 48px auto;
      padding: 24px;
      background: #f5f5f5;
    }
    h1 { font-size: 1.25rem; }
    .price {
      font-size: 2rem;
      font-weight: 700;
      color: #166534;
    }
    .stock {
      margin-top: 12px;
      padding: 8px 12px;
      background: #dcfce7;
      border-radius: 6px;
      display: inline-block;
    }
    button {
      margin-top: 24px;
      padding: 10px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Demo Product</h1>
  <p class="price" data-testid="product-price">$49.99</p>
  <p class="stock" id="stock-status">In stock</p>
  <button type="button" onclick="simulateChange()">Simulate price drop</button>
  <p style="margin-top:24px;color:#666;font-size:0.875rem">
    Use WatchDog → Pick element on the price or stock line, save a tracker, then click the button to simulate a change.
  </p>
  <script>
    function simulateChange() {
      document.querySelector('[data-testid="product-price"]').textContent = '$39.99';
      document.getElementById('stock-status').textContent = 'In stock — sale!';
    }
  </script>
</body>
</html>
